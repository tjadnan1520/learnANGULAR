<div class="page-container">
  <div class="card">

    
    <div class="card-header">
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your account</p>
    </div>

    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
        />
        <span class="error-message" *ngIf="email?.touched && email?.errors?.['required']">
          Email is required.
        </span>
        <span class="error-message" *ngIf="email?.touched && email?.errors?.['email']">
          Please enter a valid email address.
        </span>
      </div>

      
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Enter your password"
        />
        <span class="error-message" *ngIf="password?.touched && password?.errors?.['required']">
          Password is required.
        </span>
      </div>
      
      <button
        type="submit"
        class="btn btn-primary btn-block"
        [disabled]="loginForm.invalid || isLoading"
      >
        
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>

    </form>

    
    <div class="link-row">
      Don't have an account?
      <a routerLink="/register-reactive">Register with Reactive Form</a>
      or
      <a routerLink="/register-template">Template Form</a>
    </div>

    <div class="link-row" style="margin-top: 8px;">
      <a routerLink="/home">← Back to Home</a>
    </div>

  </div>
</div>
